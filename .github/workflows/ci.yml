name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run repo secret scanner
        run: bash scripts/check-secrets.sh
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          # Full-filesystem scan (no base/head diff). The diff form errored with
          # "BASE and HEAD commits are the same" on every push to main, because
          # base=main and head=HEAD resolve to the same commit. A whole-tree scan
          # is both correct for push events and more thorough for a money system.
          path: ./
          extra_args: --only-verified

  lint-and-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: Loveli Luxury International
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_for_ci_build_only
          # Server-env placeholders so getServerEnv() validation passes during
          # the build. These are NOT real credentials and never reach a real
          # service — the catalog pages' generateStaticParams degrade to []
          # when the (placeholder, unreachable) DB can't be read, so the build
          # validates compilation + bundling without needing a live database.
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key_ci_build_only
          REVALIDATE_SECRET: placeholder_revalidate_secret_min_32_chars_ci
